---
- name: Deploy Log Analyzer Application
  hosts: role_app
  become: yes
  tasks:
    - name: Create incident data directory
      file:
        path: /data/incidents
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy application source code to remote host
      copy:
        src: "{{ playbook_dir }}/../../AI_Log_Analysis-Project-1/bedrock-log-analyzer-ui/"
        dest: /home/ec2-user/bedrock-log-analyzer-ui/
        owner: ec2-user
        group: ec2-user

    - name: Copy app.env template
      template:
        src: "{{ playbook_dir }}/../templates/app.env.j2"
        dest: /home/ec2-user/bedrock-log-analyzer-ui/.env
        owner: ec2-user
        group: ec2-user
        mode: '0600'

    - name: Create private Docker network for analyzer services
      community.docker.docker_network:
        name: ids-analyzer-net
        state: present

    - name: Login to Docker Hub for private IDS AI image
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_token }}"
      no_log: true
      when:
        - dockerhub_username | length > 0
        - dockerhub_token | length > 0

    - name: Pull team IDS AI image
      community.docker.docker_image:
        name: "{{ ids_ai_image | default('docker.io/nguyencntruong/ids-project:v1') }}"
        source: pull
        force_source: yes

    - name: Run team IDS AI API container
      community.docker.docker_container:
        name: "{{ ids_ai_container_name | default('ids-layered-api') }}"
        image: "{{ ids_ai_image | default('docker.io/nguyencntruong/ids-project:v1') }}"
        state: started
        restart_policy: unless-stopped
        recreate: yes
        networks:
          - name: ids-analyzer-net
            aliases:
              - "{{ ids_ai_container_name | default('ids-layered-api') }}"
        env:
          PORT: "{{ ids_ai_port | default(8000) | string }}"
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "3"

    - name: Inspect team IDS AI API container
      community.docker.docker_container_info:
        name: "{{ ids_ai_container_name | default('ids-layered-api') }}"
      register: ids_ai_container_info

    - name: Verify correct team IDS AI image is running
      assert:
        that:
          - ids_ai_container_info.exists
          - ids_ai_container_info.container.State.Status == "running"
          - ids_ai_container_info.container.Config.Image == (ids_ai_image | default('docker.io/nguyencntruong/ids-project:v1'))
        fail_msg: "Team IDS AI container is not running with the expected image."
        success_msg: "Team IDS AI container is running with the expected image."

    - name: Build Docker image from source
      community.docker.docker_image:
        name: bedrock-log-analyzer-ui
        tag: latest
        source: build
        build:
          path: /home/ec2-user/bedrock-log-analyzer-ui
        force_source: yes
      async: 900
      poll: 10

    - name: Run Log Analyzer container (supervisord manages cron + streamlit)
      community.docker.docker_container:
        name: log-analyzer-ui
        image: bedrock-log-analyzer-ui:latest
        state: started
        restart_policy: unless-stopped
        recreate: yes
        ports:
          - "80:8501"
        networks:
          - name: ids-analyzer-net
        volumes:
          - /home/ec2-user/bedrock-log-analyzer-ui/.env:/app/.env:ro
          - /data/incidents:/data/incidents:rw
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "3"
