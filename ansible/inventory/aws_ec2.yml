plugin: amazon.aws.aws_ec2

regions:
  - "{{ lookup('env', 'AWS_REGION') | default('ap-southeast-1', true) }}"

filters:
  instance-state-name: running

# Hiển thị tag:Name trước, fallback sang private IP rồi instance-id
hostnames:
  - tag:Name
  - private-ip-address
  - instance-id

compose:
  ansible_host: instance_id
  ansible_connection: "'amazon.aws.aws_ssm'"
  ansible_aws_ssm_region: "'{{ lookup('env', 'AWS_REGION') | default('ap-southeast-1', true) }}'"
  ansible_aws_ssm_bucket_name: "'p1-dev-apse1-ansible-ssm-temp-240933274359'"
  ansible_shell_type: "'sh'"
  ansible_user: "'ec2-user'"
  ansible_python_interpreter: "'/usr/bin/python3'"

keyed_groups:
  - key: ec2_tags.Role
    prefix: role
  - key: ec2_tags.Environment
    prefix: env

groups:
  app: ec2_tags.Role == 'app'
